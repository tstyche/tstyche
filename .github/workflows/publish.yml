name: Publish

permissions:
  contents: read
  id-token: write

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
      - run: aube ci
      - run: aube run build

      - run: jaq -i 'del(.scripts, .devDependencies)' package.json

      - run: |
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            aube publish --access public --no-git-checks --provenance --tag next
          else
            aube publish --access public --no-git-checks --provenance
          fi
