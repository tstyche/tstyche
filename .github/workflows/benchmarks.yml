name: Benchmarks

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: yarn install
      - run: yarn build
      - run: mise run bench

      - uses: bencherdev/bencher@f76f8cdbdd4b10c66020928d7bb1ade1e68deda1 # main
      - name: Run bencher
        run: |
          bencher run \
          --adapter 'shell_hyperfine' \
          --file 'tstyche.bench.json' \
          --project 'tstyche' \
          --token "${{ secrets.BENCHER_TOKEN }}"
